<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Dungeon</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"

  <body class="container">

    </div>
    <hr />
    <div class="row">
      <div class="card col-4 ">

        <button class="btn btn-primary col-4" id="diceBut6"> 6</button>

      </div>

        <br />

      <div class="card col-4">
        <button class="btn btn-primary" id="monsterBut">
          generate monster
        </button>

      </div>

    <script src="./functions.js"></script>
